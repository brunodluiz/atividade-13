<html lang="en">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Simples</title>
    <link rel="stylesheet" href="styles/style.css">
</head>


<body>


    <header>
        <nav>
        <nav>

        </nav>
        </nav>
    </header>

    <main>
        <div class="container" style="width: 300px; margin: 0 auto; text-align: center;">
            <center>
            <h2 id="titulo" style="color:black; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">Login</h2>
            <form id="form-login">
                <br>
                <div id="c-email" classe="conjunto">
                    <label for="email">Email: </label>
                    <input type="email" id="email" placeholder="Email" required>
                </div>
                <br>
                <div id="c-senha" classe="conjunto">
                    <label for="senha">Senha: </label>
                    <input type="password" id="senha" placeholder="Senha" required>
                </div>
                <br>
                <button id="botao-envio" type="submit">Entrar</button>
            </form>
            <div id="mensagem"></div>
            <div class="toggle" id="toggle">
                <p> Não tem conta? Cadastre-se! </p>
            </div>
            </center>
        </div>
    </main>

    
    <script src="scripts/script.js"></script>
</body>


</html>
