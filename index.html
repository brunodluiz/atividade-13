<html lang="en">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login </title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>


<body style="background-image: url(OIP.webp);">


    <header>
        <nav>
        <nav>

        </nav>
        </nav>
    </header>

    <main>
        <div class="container" style=" background-color:white; ; width: 500px;margin: 0 auto; text-align: center; height: 700px; font-size: larger;">
            
            <h2 id="titulo" style="color:black; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">Login</h2>
            <form id="form-login">
                <br>
                <div id="c-email" classe="conjunto" style="">
                    <label for="email">Email: </label>
                    <input type="email" id="email" placeholder="Email" required>
                </div>
                <br>
                <div id="c-senha" classe="conjunto">
                    <label for="senha">Senha: </label>
                    <input type="password" id="senha" placeholder="Senha" required>
                </div>
                <br>
                <button id="botao-envio" type="submit">Entrar</button>
            </form>
            <div id="mensagem"></div>
            <div class="toggle" id="toggle">
                <p> Não tem conta? Cadastre-se! </p>
            </div>
            
        </div>
    </main>






    
    <script src="scripts/script.js"></script>
</body>


</html>
